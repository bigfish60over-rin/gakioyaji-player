<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ナガヨシリン Pro Player</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08090d;
  --card: #111318;
  --surf: #1a1c25;
  --border: rgba(255,255,255,0.07);
  --acc: #00d4ff;
  --purp: #9b5bf5;
  --gold: #f5c542;
  --txt: #dde6f0;
  --muted: #52596e;
  --glow: rgba(0,212,255,0.22);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font-family:'Noto Sans JP',sans-serif;min-height:100vh}
body{display:flex;flex-direction:column;align-items:center;padding:18px 0 60px;position:relative;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(circle at 20% 15%,rgba(0,212,255,0.055) 0%,transparent 40%),
             radial-gradient(circle at 80% 85%,rgba(155,91,245,0.055) 0%,transparent 40%);
}
.wrap{width:93%;max-width:400px;position:relative;z-index:1;display:flex;flex-direction:column;gap:12px}

.hdr{text-align:center;padding:6px 0}
.hdr h1{
  font-family:'Orbitron',monospace;font-size:0.95rem;font-weight:900;
  letter-spacing:0.18em;
  background:linear-gradient(90deg,var(--acc),var(--purp));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}

/* ============ VINYL ============ */
.vinyl-sec{display:flex;flex-direction:column;align-items:center;gap:14px;margin:8px 0 4px}
.vinyl-outer{position:relative;width:230px;height:230px}
.vinyl{
  width:230px;height:230px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,#1a1b30 0%,#0a0b15 35%,#020205 70%,#000 100%);
  box-shadow:0 8px 40px rgba(0,0,0,0.95),0 0 0 3px rgba(0,212,255,0.15),inset 0 0 30px rgba(0,0,0,0.8);
  animation:spin 3s linear infinite paused;
  position:relative
}
.vinyl.on{animation-play-state:running}
.vinyl::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:repeating-radial-gradient(circle at 50% 50%,
    transparent 0,transparent 5px,
    rgba(255,255,255,0.04) 5px,rgba(255,255,255,0.04) 6px,
    transparent 6px,transparent 11px,
    rgba(255,255,255,0.025) 11px,rgba(255,255,255,0.025) 12px)
}
.vinyl::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,transparent 30%,transparent 70%,rgba(255,255,255,0.04) 100%);
  pointer-events:none
}
.vlabel{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#2a3a55,#0d1828 70%,#050d18 100%);
  border:2px solid var(--gold);
  box-shadow:0 0 18px rgba(245,197,66,0.4),inset 0 0 10px rgba(0,0,0,0.5);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:2;text-align:center
}
.vlabel-top{font-family:'Orbitron',monospace;font-size:0.42rem;font-weight:900;color:var(--gold);letter-spacing:0.1em;line-height:1;margin-bottom:3px}
.vlabel-mid{font-family:'Noto Sans JP',sans-serif;font-size:0.55rem;font-weight:700;color:#fff;line-height:1.1;letter-spacing:0.02em}
.vlabel-sub{font-family:'Orbitron',monospace;font-size:0.36rem;font-weight:700;color:var(--acc);letter-spacing:0.18em;margin-top:3px}
.vlabel-hole{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:7px;height:7px;background:#000;border-radius:50%;
  box-shadow:inset 0 0 3px rgba(255,255,255,0.4);z-index:3
}
.needle{
  position:absolute;top:-6px;right:-22px;width:115px;height:5px;
  background:linear-gradient(to right,rgba(0,212,255,0.95) 0%,rgba(0,212,255,0.6) 60%,rgba(0,212,255,0.1) 100%);
  border-radius:3px;
  transform-origin:right center;transform:rotate(-45deg);
  transition:transform 0.7s cubic-bezier(0.34,1.56,0.64,1);
  z-index:4;
  box-shadow:0 0 12px rgba(0,212,255,0.6),0 2px 4px rgba(0,0,0,0.5)
}
.needle::after{
  content:'';position:absolute;left:-2px;top:-3px;
  width:10px;height:11px;
  background:linear-gradient(180deg,var(--acc),#0099cc);
  border-radius:0 0 5px 5px;
  box-shadow:0 0 8px var(--glow)
}
.needle::before{
  content:'';position:absolute;right:-4px;top:-4px;
  width:13px;height:13px;background:radial-gradient(circle,#666,#222);
  border-radius:50%;border:2px solid #333
}
.needle.on{transform:rotate(-22deg)}
@keyframes spin{to{transform:rotate(360deg)}}

.viz{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:24px}
.vbar{width:5px;border-radius:3px 3px 0 0;min-height:3px;background:linear-gradient(to top,var(--acc),var(--purp));animation:vib 0.5s ease-in-out infinite alternate paused}
.vbar.on{animation-play-state:running}
.vbar:nth-child(1){animation-duration:.7s;animation-delay:0s}
.vbar:nth-child(2){animation-duration:.5s;animation-delay:.1s}
.vbar:nth-child(3){animation-duration:.8s;animation-delay:.05s}
.vbar:nth-child(4){animation-duration:.55s;animation-delay:.15s}
.vbar:nth-child(5){animation-duration:.65s;animation-delay:.08s}
.vbar:nth-child(6){animation-duration:.75s;animation-delay:.12s}
.vbar:nth-child(7){animation-duration:.6s;animation-delay:.18s}
.vbar:nth-child(8){animation-duration:.45s;animation-delay:.03s}
@keyframes vib{from{height:3px;opacity:0.5}to{height:22px;opacity:1}}

.np-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;position:relative;overflow:hidden}
.np-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc),var(--purp))}
.np-lbl{font-family:'Orbitron',monospace;font-size:0.55rem;letter-spacing:0.22em;color:var(--acc);margin-bottom:6px}
.np-wrap{overflow:hidden;width:100%}
.np-title{font-size:1.05rem;font-weight:700;color:#fff;white-space:nowrap;display:inline-block}
.np-title.mq{animation:marquee var(--mq-dur,10s) linear infinite}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.prog-sec{margin-top:14px}
.time-row{display:flex;justify-content:space-between;font-family:'Orbitron',monospace;font-size:0.6rem;color:var(--muted);margin-bottom:6px}
.prog-track{width:100%;height:5px;background:var(--surf);border-radius:3px;cursor:pointer;position:relative;touch-action:none}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--purp));border-radius:3px;width:0%;pointer-events:none;position:relative}
.prog-thumb{position:absolute;right:-7px;top:-5.5px;width:16px;height:16px;background:#fff;border-radius:50%;box-shadow:0 0 10px var(--glow);opacity:0;transition:opacity .2s;pointer-events:none}
.prog-track:active .prog-thumb{opacity:1}

.ctrl-row{display:flex;justify-content:center;align-items:center;gap:10px}
.btn{border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:transform .14s;font-size:1.1rem}
.btn:active{transform:scale(0.87)}
.btn-sm{width:46px;height:46px;background:var(--surf);color:var(--txt);border:1px solid var(--border)}
.btn-sm.on{background:rgba(0,212,255,0.12);border-color:var(--acc);color:var(--acc)}
.btn-lg{width:66px;height:66px;font-size:1.7rem;background:linear-gradient(135deg,var(--acc),var(--purp));color:#000;box-shadow:0 0 22px var(--glow),0 4px 14px rgba(0,0,0,0.5)}

.vol-row{display:flex;align-items:center;gap:10px;padding:0 2px}
.vol-ico{font-size:1rem;width:22px;text-align:center}
input[type=range]{-webkit-appearance:none;flex:1;height:5px;background:var(--surf);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--acc);border-radius:50%;cursor:pointer;box-shadow:0 0 8px var(--glow)}

.status{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:rgba(245,197,66,0.07);border:1px solid rgba(245,197,66,0.2);font-size:0.7rem;color:var(--gold)}
.status.error{background:rgba(255,80,80,0.07);border-color:rgba(255,80,80,0.3);color:#ff8080}
.status.loading::before{content:'';width:10px;height:10px;border:2px solid var(--gold);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite}

.pl-card{background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.pl-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
.pl-hdr-t{font-family:'Orbitron',monospace;font-size:0.62rem;letter-spacing:0.16em;color:var(--gold)}
.pl-cnt{font-size:0.7rem;color:var(--muted)}
.pl-list{max-height:380px;overflow-y:auto}
.pl-list::-webkit-scrollbar{width:3px}
.pl-list::-webkit-scrollbar-thumb{background:var(--surf);border-radius:2px}
.pl-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer}
.pl-item:last-child{border-bottom:none}
.pl-item:active{background:rgba(255,255,255,0.04)}
.pl-item.now{background:rgba(0,212,255,0.06)}
.pl-num{font-family:'Orbitron',monospace;font-size:0.6rem;color:var(--muted);min-width:24px}
.pl-item.now .pl-num{color:var(--acc)}
.pl-name{flex:1;font-size:0.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-item.now .pl-name{color:var(--acc);font-weight:700}
.pl-empty{text-align:center;padding:30px 16px;color:var(--muted);font-size:0.78rem;line-height:1.8}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr"><h1>NAGAYOSHIRIN PRO PLAYER</h1></div>

  <div class="vinyl-sec">
    <div class="vinyl-outer">
      <div class="vinyl" id="vinyl">
        <div class="vlabel">
          <div class="vlabel-top">FISHING CLUB</div>
          <div class="vlabel-mid">ナガヨシリン</div>
          <div class="vlabel-sub">★ ORIGINAL ★</div>
        </div>
        <div class="vlabel-hole"></div>
      </div>
      <div class="needle" id="needle"></div>
    </div>
    <div class="viz" id="viz">
      <div class="vbar" style="height:10px"></div>
      <div class="vbar" style="height:16px"></div>
      <div class="vbar" style="height:7px"></div>
      <div class="vbar" style="height:21px"></div>
      <div class="vbar" style="height:9px"></div>
      <div class="vbar" style="height:15px"></div>
      <div class="vbar" style="height:12px"></div>
      <div class="vbar" style="height:19px"></div>
    </div>
  </div>

  <div class="np-card">
    <div class="np-lbl">NOW PLAYING</div>
    <div class="np-wrap"><span class="np-title" id="np-title">曲を選んでください</span></div>
    <div class="prog-sec">
      <div class="time-row">
        <span id="t-cur">0:00</span>
        <span id="t-tot">0:00</span>
      </div>
      <div class="prog-track" id="prog-track">
        <div class="prog-fill" id="prog-fill">
          <div class="prog-thumb"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="ctrl-row">
    <button class="btn btn-sm" id="shuf-btn" onclick="toggleShuffle()">🔀</button>
    <button class="btn btn-sm" onclick="prevTrack()">⏮</button>
    <button class="btn btn-lg" id="play-btn" onclick="togglePlay()">▶</button>
    <button class="btn btn-sm" onclick="nextTrack()">⏭</button>
    <button class="btn btn-sm" id="rep-btn" onclick="toggleRepeat()">🔁</button>
  </div>

  <div class="vol-row">
    <span class="vol-ico" id="vol-ico">🔊</span>
    <input type="range" id="vol-sl" min="0" max="100" value="80" step="1" oninput="setVol(this.value)">
  </div>

  <div class="status loading" id="status">クラブ共有曲を読み込み中…</div>

  <div class="pl-card">
    <div class="pl-hdr">
      <span class="pl-hdr-t">🎣 ナガヨシリン共有</span>
      <span class="pl-cnt" id="pl-cnt">0曲</span>
    </div>
    <div class="pl-list" id="pl-list">
      <div class="pl-empty">読み込み中…</div>
    </div>
  </div>

</div>

<script>
const GITHUB_USER = 'bigfish60over-rin';
const GITHUB_REPO = 'gakioyaji-player';
const GITHUB_BRANCH = 'main';
const MUSIC_DIR = 'music';

let tracks = [];
let idx = -1;
let playing = false, shuffle = false, repeat = false;
let seeking = false, autoAdv = false;

const audio = new Audio();
audio.crossOrigin = 'anonymous';
audio.volume = 0.8;

const $ = id => document.getElementById(id);
const vinyl=$('vinyl'), needle=$('needle'), npTitle=$('np-title');
const progTrk=$('prog-track'), progFill=$('prog-fill');
const tCur=$('t-cur'), tTot=$('t-tot');
const playBtn=$('play-btn'), shufBtn=$('shuf-btn'), repBtn=$('rep-btn');
const volSl=$('vol-sl'), volIco=$('vol-ico');
const plList=$('pl-list'), plCnt=$('pl-cnt');
const statusEl=$('status');
const vbars=document.querySelectorAll('.vbar');

async function loadTracks() {
  try {
    statusEl.className = 'status loading';
    statusEl.textContent = 'クラブ共有曲を読み込み中…';
    const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${MUSIC_DIR}?ref=${GITHUB_BRANCH}`;
    const resp = await fetch(apiUrl);
    if (!resp.ok) {
      if (resp.status === 404) {
        statusEl.textContent = '🎣 musicフォルダ未作成（曲なし）';
        statusEl.className = 'status';
        return;
      }
      throw new Error('GitHub API: ' + resp.status);
    }
    const items = await resp.json();
    const audioFiles = items.filter(it =>
      it.type === 'file' && /\.(mp3|m4a|wav|ogg|flac|aac)$/i.test(it.name)
    ).sort((a, b) => a.name.localeCompare(b.name, 'ja'));

    tracks = audioFiles.map(f => ({
      name: f.name.replace(/\.[^.]+$/, ''),
      url: f.download_url
    }));
    statusEl.textContent = `🎣 共有 ${tracks.length}曲 を読み込み済み`;
    statusEl.className = 'status';
    renderPl();
  } catch(err) {
    console.warn('Load failed:', err);
    statusEl.textContent = '⚠️ 共有曲の読み込みに失敗';
    statusEl.className = 'status error';
  }
}

audio.onplay = () => {
  playing = true; playBtn.textContent = '⏸';
  vinyl.classList.add('on'); needle.classList.add('on');
  vbars.forEach(b => b.classList.add('on'));
};
audio.onpause = () => {
  if (autoAdv) return;
  playing = false; playBtn.textContent = '▶';
  vinyl.classList.remove('on'); needle.classList.remove('on');
  vbars.forEach(b => b.classList.remove('on'));
};
audio.onended = () => {
  if (!repeat && tracks.length > 0) { autoAdv = true; advance(); }
};
audio.ontimeupdate = () => {
  if (seeking) return;
  const p = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  progFill.style.width = p + '%';
  tCur.textContent = fmt(audio.currentTime);
};
audio.ondurationchange = () => { tTot.textContent = fmt(audio.duration); };
audio.onerror = e => console.warn('audio', e);

function load(i, forcePlay = false) {
  if (i < 0 || i >= tracks.length) return;
  idx = i;
  audio.src = tracks[i].url;
  setTitle(tracks[i].name);
  renderPl();
  if (forcePlay || playing) audio.play().catch(e => console.warn('play:', e));
}

function advance() {
  if (!tracks.length) { autoAdv = false; return; }
  let ni;
  if (shuffle) {
    do { ni = Math.floor(Math.random() * tracks.length); }
    while (tracks.length > 1 && ni === idx);
  } else ni = (idx + 1) % tracks.length;
  idx = ni;
  audio.src = tracks[ni].url;
  setTitle(tracks[ni].name);
  renderPl();
  audio.play().then(() => { autoAdv = false; }).catch(() => { autoAdv = false; });
}

function togglePlay() {
  if (!tracks.length) return;
  if (idx < 0) load(0);
  audio.paused ? audio.play().catch(e => console.warn(e)) : audio.pause();
}

function nextTrack() {
  if (!tracks.length) return;
  let ni;
  if (shuffle) {
    do { ni = Math.floor(Math.random() * tracks.length); }
    while (tracks.length > 1 && ni === idx);
  } else ni = (idx + 1) % tracks.length;
  load(ni, true);
}

function prevTrack() {
  if (!tracks.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  load((idx - 1 + tracks.length) % tracks.length, playing);
}

function renderPl() {
  plCnt.textContent = tracks.length + '曲';
  if (!tracks.length) {
    plList.innerHTML = '<div class="pl-empty">曲がありません</div>';
    return;
  }
  plList.innerHTML = tracks.map((t, i) => {
    const isNow = i === idx;
    return `<div class="pl-item${isNow ? ' now' : ''}" onclick="playFrom(${i})">
      <span class="pl-num">${isNow ? '♪' : i + 1}</span>
      <span class="pl-name">${esc(t.name)}</span>
    </div>`;
  }).join('');
}

function playFrom(i) {
  if (i === idx && !audio.paused) return;
  load(i, true);
}

function setTitle(name) {
  npTitle.textContent = name;
  npTitle.classList.remove('mq');
  npTitle.style.animationDuration = '';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const wrap = npTitle.parentElement;
    if (npTitle.scrollWidth > wrap.clientWidth + 2) {
      npTitle.textContent = name + '\u2003\u25CF\u2003' + name;
      npTitle.style.animationDuration = Math.max(8, name.length * 0.28) + 's';
      npTitle.classList.add('mq');
    }
  }));
}

function seekTo(e) {
  const rect = progTrk.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const pct = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
  if (audio.duration && !isNaN(audio.duration)) {
    audio.currentTime = pct * audio.duration;
    progFill.style.width = (pct * 100) + '%';
    tCur.textContent = fmt(audio.currentTime);
  }
}
progTrk.addEventListener('mousedown', e => { seeking = true; seekTo(e); });
progTrk.addEventListener('touchstart', e => { seeking = true; seekTo(e); }, { passive: true });
document.addEventListener('mousemove', e => { if (seeking) seekTo(e); });
document.addEventListener('touchmove', e => { if (seeking) seekTo(e); }, { passive: true });
document.addEventListener('mouseup', () => { seeking = false; });
document.addEventListener('touchend', () => { seeking = false; });

function fmt(s) {
  if (!s || isNaN(s) || !isFinite(s)) return '0:00';
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

function setVol(v) {
  const n = Number(v);
  audio.volume = n / 100;
  volIco.textContent = n === 0 ? '🔇' : n < 50 ? '🔉' : '🔊';
  volSl.style.background = `linear-gradient(to right,var(--acc) ${n}%,var(--surf) ${n}%)`;
}
setVol(80);

function toggleShuffle() { shuffle = !shuffle; shufBtn.classList.toggle('on', shuffle); }
function toggleRepeat()  { repeat  = !repeat; audio.loop = repeat; repBtn.classList.toggle('on', repeat); }

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadTracks();
</script>
</body>
</html>
