<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#050505">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>ナガヨシリン Pro Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@600;800;900&family=Plus+Jakarta+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* =========================================================
   HAMAchan-spec Design Tokens
========================================================= */
:root{
  --bg:#050505;--bg-elev:#0e0e10;--surface:#141417;--surface-2:#1c1c20;
  --border:#27272a;--border-strong:#3f3f46;
  --text:#fafafa;--text-2:#a1a1aa;--text-3:#52525b;
  --accent:#c8f23a;--accent-soft:#c8f23a40;--accent-glow:#c8f23a20;
  --warn:#ff5470;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-feature-settings:'cv11','ss01';
background:var(--bg);color:var(--text);user-select:none;-webkit-user-select:none;
position:fixed;inset:0;letter-spacing:-0.01em}
.mono{font-family:'JetBrains Mono',monospace;font-feature-settings:'tnum','zero'}
/* ----- Background atmosphere ----- */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;
background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(200,242,58,.06) 0%,transparent 70%),
radial-gradient(ellipse 80% 40% at 50% 100%,rgba(200,242,58,.03) 0%,transparent 70%),var(--bg)}
.grain{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.05;mix-blend-mode:overlay;
background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='.85'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
.app{position:relative;z-index:2;height:100vh;height:100dvh;display:flex;flex-direction:column;
padding-top:var(--safe-top);padding-bottom:var(--safe-bot);
animation:appIn .6s cubic-bezier(.2,.9,.3,1) both}
@keyframes appIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* ----- Header ----- */
header{padding:16px 18px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;
border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:baseline;gap:8px;line-height:1}
.brand h1{font-family:'Funnel Display',sans-serif;font-weight:900;font-size:22px;letter-spacing:-0.04em;color:var(--text)}
.brand h1 .accent{background:linear-gradient(135deg,var(--accent) 0%,#a3d61f 100%);
-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--accent)}
.brand h1 .sub{font-weight:600;color:var(--text-2);margin-left:6px;font-size:.78em}
.brand .tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.3em;font-weight:500;
color:var(--text-3);text-transform:uppercase;padding:3px 7px;border:1px solid var(--border);border-radius:4px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-btn{width:38px;height:38px;border:1px solid var(--border);background:var(--surface);color:var(--text);
display:flex;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;
transition:all .15s;position:relative}
.hdr-btn:active{transform:scale(.92);background:var(--surface-2);border-color:var(--accent);color:var(--accent)}
.hdr-btn:disabled{opacity:.35;pointer-events:none}
.hdr-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr-btn.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.count{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text);
padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.count .sep{color:var(--text-3);font-weight:400;margin:0 3px}
.count .total{color:var(--text-2);font-weight:500}
/* ----- EQ Canvas section ----- */
.eq-section{margin:16px 14px 0;height:130px;position:relative;
background:linear-gradient(180deg,var(--surface) 0%,var(--bg-elev) 100%);
border:1px solid var(--border);border-radius:16px;overflow:hidden}
.eq-section::before{content:'';position:absolute;inset:0;
background:linear-gradient(180deg,transparent 0%,transparent 70%,rgba(0,0,0,.5) 100%),
repeating-linear-gradient(0deg,transparent 0,transparent 14px,rgba(255,255,255,.02) 14px,rgba(255,255,255,.02) 15px);
pointer-events:none}
#eqCanvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.eq-meta{position:absolute;top:10px;left:14px;right:14px;display:flex;justify-content:space-between;
align-items:center;pointer-events:none;z-index:2}
.eq-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.25em;
color:var(--text-3);text-transform:uppercase}
.eq-label .dot{display:inline-block;width:6px;height:6px;border-radius:50%;
background:var(--text-3);margin-right:6px;vertical-align:middle;transition:background .2s}
.eq-label.live .dot{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* ----- Now Playing ----- */
.np{margin:14px 14px 0}
.np-title-wrap{overflow:hidden;width:100%;margin-bottom:6px}
.np-title{font-family:'Funnel Display',sans-serif;font-weight:800;font-size:22px;line-height:1.15;
letter-spacing:-0.03em;color:var(--text);white-space:nowrap;display:inline-block}
.np-title.empty{color:var(--text-3);font-weight:600;font-size:17px}
.np-title.mq{animation:marquee var(--mq-dur,12s) linear infinite}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.np-sub{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.15em;
color:var(--text-2);text-transform:uppercase;display:flex;gap:10px;align-items:center}
.np-sub .pip{width:3px;height:3px;border-radius:50%;background:var(--text-3)}
.np-sub .now{color:var(--accent)}
/* ----- Seek bar ----- */
.seek-row{margin:14px 14px 0;display:flex;align-items:center;gap:12px}
.seek-time{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--text);
min-width:42px;font-feature-settings:'tnum'}
.seek-time.dur{color:var(--text-2);font-weight:500;text-align:right}
.seek-bar{flex:1;height:36px;position:relative;display:flex;align-items:center;touch-action:none;cursor:pointer}
.seek-bar::before{content:'';position:absolute;left:0;right:0;height:4px;background:var(--surface-2);border-radius:99px}
.seek-fill{position:absolute;left:0;height:4px;border-radius:99px;background:var(--accent);
pointer-events:none;box-shadow:0 0 12px var(--accent-glow);width:0%}
.seek-thumb{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--text);
box-shadow:0 0 0 4px rgba(255,255,255,.1),0 2px 8px rgba(0,0,0,.5);transform:translateX(-50%);pointer-events:none;left:0;opacity:0;transition:opacity .2s}
.seek-bar:active .seek-thumb,.seeking .seek-thumb{opacity:1}
/* ----- Controls ----- */
.controls{margin:16px 14px 0;display:flex;align-items:center;justify-content:space-between;gap:6px}
.ctrl{width:48px;height:48px;border:none;background:transparent;color:var(--text-2);
display:flex;align-items:center;justify-content:center;border-radius:12px;cursor:pointer;
transition:all .15s;position:relative}
.ctrl:active{transform:scale(.92);background:var(--surface)}
.ctrl:disabled{opacity:.3;pointer-events:none}
.ctrl svg{width:22px;height:22px;fill:currentColor}
.ctrl.play{width:64px;height:56px;background:var(--accent);color:var(--bg);border-radius:16px;
box-shadow:0 8px 20px -4px var(--accent-soft),0 2px 0 0 rgba(0,0,0,.3) inset}
.ctrl.play:active{transform:scale(.95);background:#b8e028}
.ctrl.play svg{width:24px;height:24px}
.ctrl.toggle.active{color:var(--accent)}
.ctrl.toggle.active::after{content:'';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
width:18px;height:2px;border-radius:2px;background:var(--accent);box-shadow:0 0 6px var(--accent)}
.repeat-num{position:absolute;top:8px;right:10px;font-family:'JetBrains Mono',monospace;
font-size:9px;font-weight:700;color:var(--accent);display:none}
.ctrl.toggle.active.one .repeat-num{display:block}
/* ----- Playlist ----- */
.pl-wrap{margin:18px 0 0;padding:0 14px 14px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.pl-head{display:flex;align-items:center;justify-content:space-between;padding:0 4px 10px;
position:sticky;top:0;background:linear-gradient(180deg,var(--bg) 75%,transparent);z-index:2}
.pl-tabs{display:flex;gap:6px}
.pl-tab{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.05em;
background:transparent;border:1px solid var(--border);color:var(--text-3);padding:6px 12px;
border-radius:14px;cursor:pointer;transition:all .2s;white-space:nowrap}
.pl-tab.active{background:var(--surface-2);color:var(--accent);border-color:var(--accent-soft)}
.pl-status{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.15em;
text-transform:uppercase;color:var(--text-3);padding:4px 8px;border-radius:6px;background:var(--surface)}
.pl-status.loading{color:var(--text-2)}
.pl-status.error{color:var(--warn);background:rgba(255,84,112,.08)}
.pl{list-style:none}
.track{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:6px;
background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;
transition:all .15s;min-height:64px}
.track:active{transform:scale(.99);background:var(--surface-2)}
.track.active{background:var(--surface-2);border-color:var(--accent);
box-shadow:0 0 0 1px var(--accent-soft),0 4px 16px -4px var(--accent-glow)}
.t-num{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text-3);
min-width:26px;font-feature-settings:'tnum'}
.track.active .t-num{color:var(--accent)}
.t-info{flex:1;min-width:0}
.t-name{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;
text-overflow:ellipsis;margin-bottom:2px;letter-spacing:-0.01em}
.track.active .t-name{color:var(--accent)}
.t-meta{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;
color:var(--text-3);text-transform:uppercase}
/* マイリスト用ハートボタン */
.fav-btn{background:transparent;border:none;color:var(--border-strong);padding:8px;
cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;border-radius:50%}
.fav-btn:active{transform:scale(0.8);background:var(--surface-2)}
.fav-btn.active{color:var(--warn);filter:drop-shadow(0 0 6px rgba(255,84,112,0.4))}
.fav-btn svg{width:20px;height:20px;fill:currentColor}
/* ----- Empty state ----- */
.empty{text-align:center;padding:48px 20px}
.empty .glyph{font-family:'Funnel Display',sans-serif;font-weight:900;font-size:48px;
color:var(--text-3);opacity:.3;margin-bottom:14px;letter-spacing:-.05em}
.empty p{color:var(--text-2);font-size:14px;line-height:1.7}
.empty p small{display:block;margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:10px;
font-weight:500;color:var(--text-3);letter-spacing:.2em;text-transform:uppercase}
/* ----- Toast ----- */
.toast{position:fixed;bottom:calc(20px + var(--safe-bot));left:50%;
transform:translateX(-50%) translateY(150%);background:var(--surface-2);color:var(--text);
padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;
border:1px solid var(--border-strong);box-shadow:0 12px 32px -8px rgba(0,0,0,.6);
z-index:100;transition:transform .35s cubic-bezier(.2,1,.3,1);
max-width:88%;text-align:center;letter-spacing:-0.01em}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-color:var(--warn);color:var(--warn)}
/* ----- Loading overlay ----- */
.loading{position:fixed;inset:0;background:rgba(5,5,5,.85);display:flex;flex-direction:column;
align-items:center;justify-content:center;gap:14px;z-index:200;backdrop-filter:blur(8px);
opacity:0;pointer-events:none;transition:opacity .2s}
.loading.show{opacity:1;pointer-events:auto}
.spinner{width:36px;height:36px;border:2.5px solid var(--surface-2);
border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite}
.loading-text{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;
color:var(--text-2);letter-spacing:.15em;text-transform:uppercase;text-align:center;max-width:80%}
.loading-text .sub{display:block;margin-top:6px;color:var(--text-3);font-size:10px;letter-spacing:.1em;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-wrap::-webkit-scrollbar{width:4px}
.pl-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
/* ----- Height adaptation for shorter mobile screens ----- */
@media (max-height:680px){.eq-section{height:104px}.np-title{font-size:19px}}
@media (max-height:600px){.eq-section{height:80px}}
</style>
</head>
<body>

<div class="bg"></div>
<div class="grain"></div>
<div class="app">
  <header>
    <div class="brand">
      <h1><span class="accent">PRO</span><span class="sub">player</span></h1>
      <span class="tag">ナガヨシリン</span>
    </div>
    <div class="hdr-right">
      <button class="hdr-btn" id="refreshBtn" aria-label="再読み込み" title="GitHubから再取得">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      </button>
      <div class="count" id="countBadge">
        <span id="curNum">00</span><span class="sep">/</span><span class="total" id="totNum">00</span>
      </div>
    </div>
  </header>

  <div class="eq-section">
    <canvas id="eqCanvas" width="763" height="256"></canvas>
    <div class="eq-meta">
      <span class="eq-label" id="eqLabel"><span class="dot"></span>SPECTRUM</span>
      <span class="eq-label">🎣 CLUB</span>
    </div>
  </div>

  <div class="np">
    <div class="np-title-wrap"><span class="np-title empty" id="trackTitle">トラックを選択</span></div>
    <div class="np-sub">
      <span id="trackPos">— —</span>
      <span class="pip"></span>
      <span id="trackFmt" class="now">NO SIGNAL</span>
    </div>
  </div>

  <div class="seek-row">
    <span class="seek-time mono" id="timeCur">0:00</span>
    <div class="seek-bar" id="seekBar">
      <div class="seek-fill" id="seekFill"></div>
      <div class="seek-thumb" id="seekThumb"></div>
    </div>
    <span class="seek-time dur mono" id="timeDur">0:00</span>
  </div>

  <div class="controls">
    <button class="ctrl toggle" id="shuffleBtn" aria-label="シャッフル">
      <svg viewBox="0 0 24 24"><path d="M10.59 9.17 5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
    </button>
    <button class="ctrl" id="prevBtn" aria-label="前の曲">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="ctrl play" id="playBtn" aria-label="再生/一時停止">
      <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="ctrl" id="nextBtn" aria-label="次の曲">
      <svg viewBox="0 0 24 24"><path d="M6 18 14.5 12 6 6v12zM16 6v12h2V6z"/></svg>
    </button>
    <button class="ctrl toggle" id="repeatBtn" aria-label="リピート">
      <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      <span class="repeat-num">1</span>
    </button>
  </div>

  <div class="pl-wrap">
    <div class="pl-head">
      <div class="pl-tabs">
        <button class="pl-tab active" id="tabAll">ALL TRACKS</button>
        <button class="pl-tab" id="tabFav">FAVORITES</button>
      </div>
      <span class="pl-status loading" id="plStatus">LOADING…</span>
    </div>
    <ul class="pl" id="playlist"></ul>
  </div>
</div>

<div class="toast" id="toast">準備中</div>
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingMain">クラブ共有曲を読み込み中<span class="sub" id="loadingSub"></span></div>
</div>

<audio id="audio" preload="metadata" crossorigin="anonymous"></audio>

<script>
'use strict';

/* =========================================================
   設定
========================================================= */
const GITHUB_USER = 'bigfish60over-rin';
const GITHUB_REPO = 'gakioyaji-player';
const GITHUB_BRANCH = 'main';
const MUSIC_DIR = 'music';
const LS_KEY = 'rin_fav_tracks'; // お気に入り保存用のキー

/* =========================================================
   STATE
========================================================= */
const state = {
  allTracks: [], // GitHubにある全曲
  tracks: [],    // 現在表示＆再生対象の曲（全曲 or マイリスト）
  favs: JSON.parse(localStorage.getItem(LS_KEY) || '[]'), // お気に入りの曲名配列
  viewMode: 'all', // 'all' | 'fav'
  currentIdx: -1,
  isPlaying: false,
  shuffle: false,
  repeat: 'off', 
  shuffleOrder: [],
  shufflePos: 0,
  seeking: false,
  rafId: null,
  eqLive: false
};

/* =========================================================
   Web Audio API (本物EQ用)
========================================================= */
let audioCtx = null;
let analyser = null;
let sourceNode = null;
let freqData = null;

function initAudioContext() {
  if (!audioCtx) {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256; 
    analyser.smoothingTimeConstant = 0.8; 
    sourceNode = audioCtx.createMediaElementSource(audio);
    sourceNode.connect(analyser);
    analyser.connect(audioCtx.destination);
    freqData = new Uint8Array(analyser.frequencyBinCount);
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

/* =========================================================
   DOM
========================================================= */
const $ = id => document.getElementById(id);
const audio = $('audio');
const playBtn = $('playBtn');
const playIcon = $('playIcon');
const prevBtn = $('prevBtn');
const nextBtn = $('nextBtn');
const shuffleBtn = $('shuffleBtn');
const repeatBtn = $('repeatBtn');
const refreshBtn = $('refreshBtn');
const trackTitle = $('trackTitle');
const trackPos = $('trackPos');
const trackFmt = $('trackFmt');
const timeCur = $('timeCur');
const timeDur = $('timeDur');
const seekBar = $('seekBar');
const seekFill = $('seekFill');
const seekThumb = $('seekThumb');
const curNum = $('curNum');
const totNum = $('totNum');
const toast = $('toast');
const loading = $('loading');
const loadingMain = $('loadingMain');
const loadingSub = $('loadingSub');
const eqCanvas = $('eqCanvas');
const eqLabel = $('eqLabel');
const playlist = $('playlist');
const plStatus = $('plStatus');
const tabAll = $('tabAll');
const tabFav = $('tabFav');

const PLAY_SVG = '<path d="M8 5v14l11-7z"/>';
const PAUSE_SVG = '<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>';
const HEART_SVG = '<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>';

/* =========================================================
   ユーティリティ
========================================================= */
const fmt = s => {
  if (!isFinite(s) || s < 0) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
};

const escapeHtml = s => String(s).replace(/[&<>"']/g, c => (
  {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
));

const showToast = (msg, isErr = false) => {
  toast.textContent = msg;
  toast.classList.toggle('error', isErr);
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), 2600);
};

function setLoading(on, mainText) {
  loading.classList.toggle('show', !!on);
  if (mainText !== undefined) {
    loadingMain.childNodes[0].textContent = mainText;
    loadingSub.textContent = '';
  }
}

function setLoadingSub(text) {
  loadingSub.textContent = text || '';
}

/* =========================================================
   GitHub API & View Mode
========================================================= */
async function loadTracks(isRefresh = false) {
  const prevName = (state.currentIdx >= 0 && state.tracks[state.currentIdx]) 
    ? state.tracks[state.currentIdx].name : null;

  try {
    plStatus.textContent = 'LOADING…';
    if (!isRefresh) setLoading(true, 'クラブ共有曲を読み込み中');
    setLoadingSub('GitHub APIに問い合わせ中');

    const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${MUSIC_DIR}?ref=${GITHUB_BRANCH}&_=${Date.now()}`;
    const resp = await fetch(apiUrl, { cache: 'no-store' });

    if (!resp.ok) {
      if (resp.status === 404) {
        plStatus.textContent = 'NO MUSIC';
        state.allTracks = [];
        applyViewMode(state.viewMode, prevName);
        setLoading(false);
        showToast('🎣 musicフォルダ未作成（曲なし）', true);
        return;
      }
      throw new Error('GitHub API: ' + resp.status);
    }

    const items = await resp.json();
    const audioFiles = items.filter(it => it.type === 'file' && /\.(mp3|m4a|wav|ogg|flac|aac)$/i.test(it.name) )
                            .sort((a, b) => a.name.localeCompare(b.name, 'ja'));

    state.allTracks = audioFiles.map((f, i) => ({
      id: 'gh-' + i,
      name: f.name.replace(/\.[^.]+$/, ''),
      url: f.download_url,
      ext: (f.name.match(/\.([^.]+)$/) || ['',''])[1].toUpperCase(),
      duration: null
    }));

    setLoading(false);
    applyViewMode(state.viewMode, prevName);

    if (isRefresh) showToast('🎣 曲リストを最新化しました');
  } catch (err) {
    console.warn('loadTracks failed:', err);
    plStatus.textContent = 'ERROR';
    setLoading(false);
    showToast('⚠️ 共有曲の読み込みに失敗しました', true);
  }
}

function applyViewMode(mode, preserveName = null) {
  state.viewMode = mode;
  tabAll.classList.toggle('active', mode === 'all');
  tabFav.classList.toggle('active', mode === 'fav');

  if (mode === 'fav') {
    state.tracks = state.allTracks.filter(t => state.favs.includes(t.name));
  } else {
    state.tracks = [...state.allTracks];
  }

  // 表示切替時に、現在再生中の曲が新しいリストにあればインデックスを維持、なければ停止
  if (preserveName) {
    const newIdx = state.tracks.findIndex(t => t.name === preserveName);
    if (newIdx >= 0) {
      state.currentIdx = newIdx;
    } else {
      state.currentIdx = -1;
      audio.pause();
    }
  } else if (state.currentIdx < 0 && state.tracks.length > 0) {
    state.currentIdx = 0;
  } else if (state.tracks.length === 0) {
    state.currentIdx = -1;
    audio.pause();
  } else {
    // リストの長さが変わった場合の安全措置
    state.currentIdx = 0;
  }

  if (state.shuffle) buildShuffleOrder();
  
  render();
  updateNowPlaying();
  updateMediaSession();
}

/* =========================================================
   再生制御
========================================================= */
function safePlay() {
  initAudioContext(); 
  const p = audio.play();
  if (p && typeof p.catch === 'function') {
    p.catch(e => {
      console.warn('play failed:', e);
      showToast('再生できませんでした', true);
    });
  }
}

function loadTrack(idx, autoPlay) {
  if (idx < 0 || idx >= state.tracks.length) return;
  state.currentIdx = idx;
  const t = state.tracks[idx];
  audio.src = t.url;
  updateNowPlaying();
  render();
  updateMediaSession();
  if (autoPlay) safePlay();
}

function togglePlay() {
  if (!state.tracks.length) return;
  if (state.currentIdx < 0) state.currentIdx = 0;
  const t = state.tracks[state.currentIdx];
  if (!t) return;
  
  if (!audio.src || audio.src === window.location.href) {
    audio.src = t.url;
    updateMediaSession();
  }
  
  if (audio.paused) safePlay();
  else audio.pause();
}

function nextTrack(auto = false) {
  if (!state.tracks.length) return;
  let ni;
  if (state.shuffle) {
    state.shufflePos = (state.shufflePos + 1) % state.shuffleOrder.length;
    ni = state.shuffleOrder[state.shufflePos];
  } else {
    ni = state.currentIdx + 1;
    if (ni >= state.tracks.length) {
      if (state.repeat === 'all') ni = 0;
      else if (auto) { audio.pause(); return; }
      else ni = 0; 
    }
  }
  loadTrack(ni, true);
}

function prevTrack() {
  if (!state.tracks.length) return;
  if (audio.currentTime > 3) {
    audio.currentTime = 0;
    return;
  }
  let ni;
  if (state.shuffle) {
    state.shufflePos = (state.shufflePos - 1 + state.shuffleOrder.length) % state.shuffleOrder.length;
    ni = state.shuffleOrder[state.shufflePos];
  } else {
    ni = (state.currentIdx - 1 + state.tracks.length) % state.tracks.length;
  }
  loadTrack(ni, true);
}

function buildShuffleOrder() {
  const n = state.tracks.length;
  const order = Array.from({length: n}, (_, i) => i);
  for (let i = n - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  state.shuffleOrder = order;
  state.shufflePos = state.currentIdx >= 0 ? order.indexOf(state.currentIdx) : 0;
  if (state.shufflePos < 0) state.shufflePos = 0;
}

/* =========================================================
   レンダリング
========================================================= */
function render() {
  const n = state.tracks.length;
  curNum.textContent = String(state.currentIdx < 0 ? 0 : state.currentIdx + 1).padStart(2, '0');
  totNum.textContent = String(n).padStart(2, '0');
  
  if (state.viewMode === 'all') {
    plStatus.textContent = state.allTracks.length + ' TRACKS';
  } else {
    plStatus.textContent = state.tracks.length + ' FAVS';
  }
  
  prevBtn.disabled = nextBtn.disabled = playBtn.disabled = n === 0;
  shuffleBtn.disabled = repeatBtn.disabled = n === 0;
  
  if (n === 0) {
    const msg = state.viewMode === 'fav' 
      ? 'マイリストに曲がありません<small>ALL TRACKSから♡を押して追加</small>' 
      : 'プレイリストは空です<small>music/フォルダに楽曲を追加</small>';
    playlist.innerHTML = `<div class="empty"><div class="glyph">∿</div><p>${msg}</p></div>`;
    return;
  }
  
  let html = '';
  for (let i = 0; i < n; i++) {
    const t = state.tracks[i];
    const active = i === state.currentIdx ? ' active' : '';
    const isFav = state.favs.includes(t.name);
    const favCls = isFav ? ' active' : '';
    const meta = t.ext + ' · CLUB SHARED';
    
    html += `<li class="track${active}" data-i="${i}">` +
            `<span class="t-num">${String(i + 1).padStart(2, '0')}</span>` +
            `<div class="t-info">` +
              `<div class="t-name">${escapeHtml(t.name)}</div>` +
              `<div class="t-meta">${escapeHtml(meta)}</div>` +
            `</div>` +
            `<button class="fav-btn${favCls}" data-name="${escapeHtml(t.name)}" aria-label="お気に入り">` +
              `<svg viewBox="0 0 24 24">${HEART_SVG}</svg>` +
            `</button>` +
            `</li>`;
  }
  playlist.innerHTML = html;
}

function updateNowPlaying() {
  if (state.currentIdx < 0 || !state.tracks[state.currentIdx]) {
    trackTitle.textContent = 'トラックを選択';
    trackTitle.classList.add('empty');
    trackTitle.classList.remove('mq');
    trackPos.textContent = '— —';
    trackFmt.textContent = 'NO SIGNAL';
    return;
  }
  
  const t = state.tracks[state.currentIdx];
  trackTitle.classList.remove('empty');
  setMarqueeTitle(t.name);
  trackPos.textContent = String(state.currentIdx + 1).padStart(2, '0') + ' / ' + String(state.tracks.length).padStart(2, '0');
  trackFmt.textContent = t.ext || 'AUDIO';
}

function setMarqueeTitle(name) {
  trackTitle.classList.remove('mq');
  trackTitle.style.removeProperty('--mq-dur');
  trackTitle.textContent = name;
  
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const wrap = trackTitle.parentElement;
    if (trackTitle.scrollWidth > wrap.clientWidth + 2) {
      trackTitle.textContent = name + '\u2003\u25CF\u2003' + name;
      trackTitle.style.setProperty('--mq-dur', Math.max(8, name.length * 0.32) + 's');
      trackTitle.classList.add('mq');
    }
  }));
}

/* =========================================================
   Seek bar インタラクション
========================================================= */
function updateSeekUI() {
  if (state.seeking) return;
  const d = audio.duration;
  const c = audio.currentTime;
  const pct = (isFinite(d) && d > 0) ? (c / d) * 100 : 0;
  
  seekFill.style.width = pct + '%';
  seekThumb.style.left = pct + '%';
  timeCur.textContent = fmt(c);
}

function seekFromEvent(e) {
  const rect = seekBar.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const pct = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
  const d = audio.duration;
  
  if (isFinite(d) && d > 0) {
    audio.currentTime = pct * d;
    seekFill.style.width = (pct * 100) + '%';
    seekThumb.style.left = (pct * 100) + '%';
    timeCur.textContent = fmt(pct * d);
  }
}

/* =========================================================
   Canvas 本物EQ
========================================================= */
let canvasCtx = null;

function setupCanvas() {
  if (!eqCanvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = eqCanvas.getBoundingClientRect();
  eqCanvas.width = Math.max(1, Math.floor(rect.width * dpr));
  eqCanvas.height = Math.max(1, Math.floor(rect.height * dpr));
  canvasCtx = eqCanvas.getContext('2d');
  if (canvasCtx) canvasCtx.scale(dpr, dpr);
}

function resizeCanvas() {
  setupCanvas();
}

const EQ_BARS = 48;
const eqCur = new Float32Array(EQ_BARS); 
const eqPeak = new Float32Array(EQ_BARS); 

function drawEQ() {
  if (!canvasCtx) setupCanvas();
  if (!canvasCtx) { state.rafId = requestAnimationFrame(drawEQ); return; }
  
  let w = eqCanvas.clientWidth;
  let h = eqCanvas.clientHeight;
  if (w < 2 || h < 2) { setupCanvas(); state.rafId = requestAnimationFrame(drawEQ); return; }

  canvasCtx.clearRect(0, 0, w, h);
  const playing = !audio.paused && !audio.ended && state.currentIdx >= 0;
  let isLive = false;

  if (analyser && playing) {
    analyser.getByteFrequencyData(freqData);
  }

  const gap = 2;
  const barW = (w - gap * (EQ_BARS - 1)) / EQ_BARS;
  const baseY = h * 0.90;
  const maxH = h * 0.74;

  for (let i = 0; i < EQ_BARS; i++) {
    let target = 0.025; 

    if (analyser && playing) {
      const binIndex = Math.floor(i * (80 / EQ_BARS));
      const rawVal = freqData[binIndex] / 255.0; 
      target = 0.025 + (rawVal * 0.95);
      if (rawVal > 0.05) isLive = true;
    }

    if (target > 1) target = 1;

    eqCur[i] += (target - eqCur[i]) * (playing ? 0.35 : 0.12);

    if (eqCur[i] > eqPeak[i]) eqPeak[i] = eqCur[i];
    else eqPeak[i] = Math.max(eqCur[i], eqPeak[i] - 0.012);

    const barH = eqCur[i] * maxH;
    const x = i * (barW + gap);
    const y = baseY - barH;
    const intensity = Math.min(1, eqCur[i] * 1.25);

    const grad = canvasCtx.createLinearGradient(0, y, 0, baseY);
    grad.addColorStop(0, `rgba(200,242,58,${0.95 * intensity + 0.05})`);
    grad.addColorStop(0.55, `rgba(200,242,58,${0.50 * intensity + 0.10})`);
    grad.addColorStop(1, `rgba(200,242,58,${0.15 * intensity + 0.04})`);
    canvasCtx.fillStyle = grad;

    const r = Math.min(barW / 2, 2);
    canvasCtx.beginPath();
    canvasCtx.moveTo(x, y + r);
    canvasCtx.arcTo(x, y, x + r, y, r);
    canvasCtx.lineTo(x + barW - r, y);
    canvasCtx.arcTo(x + barW, y, x + barW, y + r, r);
    canvasCtx.lineTo(x + barW, baseY);
    canvasCtx.lineTo(x, baseY);
    canvasCtx.closePath();
    canvasCtx.fill();

    if (eqPeak[i] > 0.06) {
      const peakY = baseY - eqPeak[i] * maxH;
      canvasCtx.fillStyle = `rgba(255,255,255,${0.45 + intensity * 0.45})`;
      canvasCtx.fillRect(x, peakY - 2, barW, 2);
    }

    const refH = h * 0.30;
    const refGrad = canvasCtx.createLinearGradient(0, baseY, 0, baseY + refH);
    refGrad.addColorStop(0, `rgba(200,242,58,${0.14 * intensity})`);
    refGrad.addColorStop(1, 'rgba(200,242,58,0)');
    canvasCtx.fillStyle = refGrad;
    canvasCtx.fillRect(x, baseY, barW, refH);
  }

  if (isLive !== state.eqLive) {
    state.eqLive = isLive;
    eqLabel.classList.toggle('live', isLive);
  }

  state.rafId = requestAnimationFrame(drawEQ);
}

/* =========================================================
   MediaSession（スマホロック画面コントロール）
========================================================= */
function updateMediaSession() {
  if (!('mediaSession' in navigator) || state.currentIdx < 0) return;
  const t = state.tracks[state.currentIdx];
  if (!t) return;
  
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.name,
      artist: 'ナガヨシリン Pro Player',
      album: 'ナガヨシリン Fishing Club',
    });
    navigator.mediaSession.setActionHandler('play', () => safePlay());
    navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
    navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack(false));
  } catch (e) {}
}

/* =========================================================
   Audio イベント
========================================================= */
audio.addEventListener('play', () => {
  state.isPlaying = true;
  playIcon.innerHTML = PAUSE_SVG;
});

audio.addEventListener('pause', () => {
  state.isPlaying = false;
  playIcon.innerHTML = PLAY_SVG;
});

audio.addEventListener('ended', () => {
  if (state.repeat === 'one') {
    audio.currentTime = 0;
    safePlay();
    return;
  }
  nextTrack(true);
});

audio.addEventListener('timeupdate', updateSeekUI);

audio.addEventListener('durationchange', () => {
  timeDur.textContent = fmt(audio.duration);
  if (state.currentIdx >= 0 && state.tracks[state.currentIdx]) {
    state.tracks[state.currentIdx].duration = audio.duration;
  }
});

audio.addEventListener('error', () => {
  console.warn('audio error', audio.error);
  showToast('音声の読み込みに失敗しました', true);
});

/* =========================================================
   Event Listeners
========================================================= */
playBtn.addEventListener('click', togglePlay);
prevBtn.addEventListener('click', prevTrack);
nextBtn.addEventListener('click', () => nextTrack(false));

shuffleBtn.addEventListener('click', () => {
  state.shuffle = !state.shuffle;
  shuffleBtn.classList.toggle('active', state.shuffle);
  if (state.shuffle) buildShuffleOrder();
  showToast(state.shuffle ? 'シャッフル ON' : 'シャッフル OFF');
});

repeatBtn.addEventListener('click', () => {
  const modes = ['off', 'all', 'one'];
  state.repeat = modes[(modes.indexOf(state.repeat) + 1) % 3];
  
  repeatBtn.classList.toggle('active', state.repeat !== 'off');
  repeatBtn.classList.toggle('one', state.repeat === 'one');
  
  const labels = { off: 'リピート OFF', all: 'リピート ALL', one: 'リピート 1曲' };
  showToast(labels[state.repeat]);
});

refreshBtn.addEventListener('click', () => {
  refreshBtn.classList.add('spinning');
  const curName = (state.currentIdx >= 0 && state.tracks[state.currentIdx]) ? state.tracks[state.currentIdx].name : null;
  loadTracks(true).finally(() => {
    setTimeout(() => refreshBtn.classList.remove('spinning'), 400);
  });
});

// タブ切り替え
tabAll.addEventListener('click', () => applyViewMode('all', state.tracks[state.currentIdx]?.name));
tabFav.addEventListener('click', () => applyViewMode('fav', state.tracks[state.currentIdx]?.name));

// Playlist タップ（再生 ＆ お気に入り登録）
playlist.addEventListener('click', e => {
  // お気に入りボタンが押された場合
  const favBtn = e.target.closest('.fav-btn');
  if (favBtn) {
    e.stopPropagation(); // 曲の再生が走るのを防ぐ
    const name = favBtn.dataset.name;
    
    if (state.favs.includes(name)) {
      state.favs = state.favs.filter(n => n !== name);
      showToast('マイリストから削除しました');
    } else {
      state.favs.push(name);
      showToast('♡ マイリストに追加しました');
    }
    
    // ブラウザに保存
    localStorage.setItem(LS_KEY, JSON.stringify(state.favs));
    
    // マイリスト表示中の場合はリストを更新、そうでない場合は見た目だけ変える
    if (state.viewMode === 'fav') {
      applyViewMode('fav', state.tracks[state.currentIdx]?.name);
    } else {
      favBtn.classList.toggle('active', state.favs.includes(name));
    }
    return;
  }

  // 曲自体が押された場合
  const li = e.target.closest('[data-i]');
  if (li) {
    loadTrack(Number(li.dataset.i), true);
  }
});

// Seek bar
seekBar.addEventListener('mousedown', e => { state.seeking = true; seekBar.classList.add('seeking'); seekFromEvent(e); });
seekBar.addEventListener('touchstart', e => { state.seeking = true; seekBar.classList.add('seeking'); seekFromEvent(e); }, { passive: true });
document.addEventListener('mousemove', e => { if (state.seeking) seekFromEvent(e); });
document.addEventListener('touchmove', e => { if (state.seeking) seekFromEvent(e); }, { passive: true });
const endSeek = () => { if (!state.seeking) return; state.seeking = false; seekBar.classList.remove('seeking'); };
document.addEventListener('mouseup', endSeek);
document.addEventListener('touchend', endSeek);
document.addEventListener('touchcancel', endSeek);

// リサイズ
let resizeT;
window.addEventListener('resize', () => {
  clearTimeout(resizeT);
  resizeT = setTimeout(resizeCanvas, 120);
});

/* =========================================================
   初期化
========================================================= */
(async function init() {
  playIcon.innerHTML = PLAY_SVG;
  await loadTracks(false);
  requestAnimationFrame(() => {
    setupCanvas();
    drawEQ();
  });
})();

</script>
</body>
</html>
